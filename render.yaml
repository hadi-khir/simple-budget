services:
  - type: web
    name: simple-budget
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
    disk:
      name: budget-data
      mountPath: /data
      sizeGB: 1
